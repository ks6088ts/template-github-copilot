name: github-copilot-sdk

on:
  workflow_dispatch:
    inputs:
      prompt:
        type: string
        description: "The prompt to use for Copilot SDK app."
        required: true
        default: "Hello"
      model:
        type: choice
        description: Specify the model to use for Copilot CLI server
        options:
          - gpt-5-mini
          - claude-opus-4.6
          - claude-sonnet-4.6
        required: true
        default: gpt-5-mini

jobs:
  test:
    strategy:
      matrix:
        platform:
          - "ubuntu-latest"
        python-version:
          - "3.13"
        node-version:
          - "22.12.0"
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 5
    environment: dev
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install GitHub Copilot CLI
        run: |
          curl -fsSL https://gh.io/copilot-install | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install Python dependencies
        working-directory: src/python
        run: |
          make install-deps
      - name: Start Copilot server
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        working-directory: src/python
        run: |
          make copilot COPILOT_MODEL="${{ github.event.inputs.model }}" &
          # Wait for the server to be ready on port 3000
          echo "Waiting for Copilot server to start on port 3000..."
          for i in $(seq 1 30); do
            if nc -z localhost 3000 2>/dev/null; then
              echo "Copilot server is ready!"
              break
            fi
            echo "Attempt $i/30: Server not ready yet, retrying in 2s..."
            sleep 2
          done
      - name: Run Copilot SDK app
        working-directory: src/python
        run: |
          cp .env.template .env
          uv run python scripts/chat.py chat --verbose --prompt "${{ github.event.inputs.prompt }}"
