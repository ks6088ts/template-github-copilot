<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>template-github-copilot</title>
  <style>
    /* ── Light theme (default) ─────────────────────────────────── */
    :root {
      --bg: #ffffff;
      --surface: #f6f8fa;
      --border: #d1d9e0;
      --text: #1f2328;
      --muted: #656d76;
      --accent: #1f883d;
      --accent-hover: #1a7f37;
      --accent-text: #ffffff;
      --user-bg: #ddf4ff;
      --bot-bg: #f6f8fa;
      --input-bg: #ffffff;
      --danger: #cf222e;
      --shadow: rgba(31,35,40,0.04);
    }

    /* ── Dark theme ────────────────────────────────────────────── */
    [data-theme="dark"] {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #238636;
      --accent-hover: #2ea043;
      --accent-text: #ffffff;
      --user-bg: #1f2937;
      --bot-bg: #21262d;
      --input-bg: #0d1117;
      --danger: #f85149;
      --shadow: rgba(0,0,0,0.2);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.2s, color 0.2s;
    }

    /* ── Header ────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-left svg {
      flex-shrink: 0;
    }
    header h1 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
    }
    .user-info img {
      width: 26px;
      height: 26px;
      border-radius: 50%;
    }

    /* ── Theme toggle ──────────────────────────────────────────── */
    .theme-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .theme-toggle:hover {
      color: var(--text);
      border-color: var(--muted);
    }
    .theme-toggle svg { width: 16px; height: 16px; }
    .theme-toggle .icon-sun { display: none; }
    [data-theme="dark"] .theme-toggle .icon-moon { display: none; }
    [data-theme="dark"] .theme-toggle .icon-sun { display: block; }

    /* ── Buttons ───────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .btn:hover { background: var(--border); }
    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--accent-text);
      font-weight: 600;
    }
    .btn-primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* ── Chat area ─────────────────────────────────────────────── */
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .message {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.55;
      word-break: break-word;
      font-size: 0.9rem;
    }
    .message.user {
      align-self: flex-end;
      background: var(--user-bg);
      border-radius: 12px 12px 4px 12px;
      white-space: pre-wrap;
    }
    .message.bot {
      align-self: flex-start;
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-radius: 12px 12px 12px 4px;
      white-space: pre-line;
    }
    .message.error {
      color: var(--danger);
      border-color: var(--danger);
    }
    .typing {
      align-self: flex-start;
      color: var(--muted);
      font-size: 0.82rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .typing-dots span {
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--muted);
      animation: blink 1.4s infinite both;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.3; }
      40% { opacity: 1; }
    }

    /* ── Input bar ─────────────────────────────────────────────── */
    #input-bar {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    #input-bar input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--input-bg);
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    #input-bar input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(31,136,61,0.15);
    }

    /* ── Login screen ──────────────────────────────────────────── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 20px;
    }
    #login-screen svg { opacity: 0.5; }
    #login-screen p {
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
      max-width: 360px;
      line-height: 1.5;
    }
    .login-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      border: none;
      border-radius: 6px;
      background: var(--accent);
      color: var(--accent-text);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .login-btn:hover { background: var(--accent-hover); }
    .login-btn svg { width: 18px; height: 18px; }

    /* ── Tabs ───────────────────────────────────────────────────── */
    .tabs {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      gap: 2px;
    }
    .tab-btn {
      padding: 10px 16px;
      border: none;
      border-bottom: 2px solid transparent;
      background: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      color: var(--text);
      font-weight: 600;
      border-bottom-color: var(--accent);
    }

    /* ── Report panel ──────────────────────────────────────────── */
    #report-panel {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: none;
      flex-direction: column;
      gap: 16px;
      max-width: 720px;
    }
    .report-form { display: flex; flex-direction: column; gap: 12px; }
    .report-form label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
    }
    .report-form textarea,
    .report-form input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--input-bg);
      color: var(--text);
      font-family: inherit;
      font-size: 0.88rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .report-form textarea:focus,
    .report-form input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(31,136,61,0.15);
    }
    .query-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .query-row input { flex: 1; }
    .btn-icon {
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      flex-shrink: 0;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-icon:hover { color: var(--text); border-color: var(--muted); }
    .btn-icon.danger:hover { color: var(--danger); border-color: var(--danger); }
    .report-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #report-status {
      font-size: 0.82rem;
      color: var(--muted);
    }

    /* ── Report results ────────────────────────────────────────── */
    .report-results { display: flex; flex-direction: column; gap: 12px; }
    .report-summary {
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.88rem;
    }
    .report-summary .stat {
      display: inline-block;
      margin-right: 16px;
    }
    .report-summary .stat b { color: var(--accent); }
    .report-summary .stat.fail b { color: var(--danger); }
    .report-item {
      padding: 12px 16px;
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .report-item .query-label {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 4px;
      font-weight: 500;
    }
    .report-item .response {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.55;
      font-size: 0.88rem;
    }
    .report-item .error-text { color: var(--danger); }

    /* ── Copy button ──────────────────────────────────────────── */
    .msg-wrapper {
      display: flex;
      flex-direction: column;
      align-self: flex-start;
      max-width: 70%;
      gap: 2px;
    }
    .msg-wrapper .message {
      max-width: 100%;
    }
    .copy-btn {
      align-self: flex-start;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border: none;
      border-radius: 4px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.72rem;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }
    .msg-wrapper:hover .copy-btn,
    .report-item:hover .copy-btn { opacity: 1; }
    .copy-btn:hover { color: var(--text); }
    .copy-btn svg {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
    }
    .copy-btn.copied {
      color: var(--accent);
      opacity: 1;
    }

    /* ── Empty state ───────────────────────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: var(--muted);
      font-size: 0.88rem;
      text-align: center;
      gap: 8px;
      padding: 40px 20px;
    }
    .empty-state svg { opacity: 0.35; }
  </style>
</head>

  </div>

  <!-- Report panel -->
  <div id="report-panel">
    <div class="report-form">
      <label for="system-prompt">System Prompt</label>
      <textarea id="system-prompt" rows="3" placeholder="e.g. You are a helpful assistant that answers concisely."></textarea>

      <label>Queries</label>
      <div id="query-list">
        <div class="query-row">
          <input type="text" class="query-input" placeholder="Enter a query…" />
          <button class="btn-icon danger remove-query" title="Remove">&times;</button>
        </div>
      </div>
      <button class="btn" id="add-query-btn">+ Add Query</button>

      <div class="report-actions">
        <button class="btn btn-primary" id="run-report-btn">Run Report</button>
        <span id="report-status"></span>
      </div>
    </div>

    <div id="report-results" class="report-results"></div>
  </div>

  <script>
    const chatContainer = document.getElementById("chat-container");
    const chatEmpty = document.getElementById("chat-empty");
    const inputBar = document.getElementById("input-bar");
    const loginScreen = document.getElementById("login-screen");
    const headerRight = document.getElementById("header-right");
    const msgInput = document.getElementById("msg-input");
    const sendBtn = document.getElementById("send-btn");
    const tabBar = document.getElementById("tab-bar");
    const reportPanel = document.getElementById("report-panel");

    // ── Theme ───────────────────────────────────────────────────────
    (function initTheme() {
      const saved = localStorage.getItem("theme");
      if (saved) {
        document.documentElement.setAttribute("data-theme", saved);
      } else {
        // Follow system preference
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.setAttribute("data-theme", prefersDark ? "dark" : "light");
      }
    })();

    document.getElementById("theme-toggle").addEventListener("click", () => {
      const current = document.documentElement.getAttribute("data-theme");
      const next = current === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      localStorage.setItem("theme", next);
    });

    // Listen for system theme changes when no user preference is saved
    window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", (e) => {
      if (!localStorage.getItem("theme")) {
        document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
      }
    });

    // ── Tabs ────────────────────────────────────────────────────────
    function switchTab(tab) {
      document.querySelectorAll(".tab-btn").forEach(b => {
        b.classList.toggle("active", b.dataset.tab === tab);
      });
      if (tab === "chat") {
        chatContainer.style.display = "flex";
        inputBar.style.display = "flex";
        reportPanel.style.display = "none";
        msgInput.focus();
      } else {
        chatContainer.style.display = "none";
        inputBar.style.display = "none";
        reportPanel.style.display = "flex";
      }
    }
    tabBar.addEventListener("click", (e) => {
      const btn = e.target.closest(".tab-btn");
      if (btn) switchTab(btn.dataset.tab);
    });

    // ── Bootstrap ───────────────────────────────────────────────────
    async function init() {
      try {
        const resp = await fetch("/api/me");
        if (!resp.ok) throw new Error("not authed");
        const user = await resp.json();
        showChat(user);
      } catch {
        showLogin();
      }
    }

    function showLogin() {
      loginScreen.style.display = "flex";
      tabBar.style.display = "none";
      chatContainer.style.display = "none";
      inputBar.style.display = "none";
      reportPanel.style.display = "none";
      headerRight.innerHTML = "";
    }

    function showChat(user) {
      loginScreen.style.display = "none";
      tabBar.style.display = "flex";
      switchTab("chat");

      let avatar = "";
      if (user.avatar_url) {
        avatar = `<img src="${user.avatar_url}" alt="avatar" />`;
      }
      headerRight.innerHTML = `
        <div class="user-info">
          ${avatar}
          <span>${user.login}</span>
          <a href="/auth/logout" class="btn">Logout</a>
        </div>
      `;
      msgInput.focus();
    }

    // ── Copy helper ─────────────────────────────────────────────────
    const COPY_ICON = '<svg viewBox="0 0 16 16" fill="currentColor"><path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z"/><path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"/></svg>';
    const CHECK_ICON = '<svg viewBox="0 0 16 16" fill="currentColor"><path d="M13.78 4.22a.75.75 0 0 1 0 1.06l-7.25 7.25a.75.75 0 0 1-1.06 0L2.22 9.28a.751.751 0 0 1 .018-1.042.751.751 0 0 1 1.042-.018L6 10.94l6.72-6.72a.75.75 0 0 1 1.06 0Z"/></svg>';

    function createCopyBtn(getText) {
      const btn = document.createElement("button");
      btn.className = "copy-btn";
      btn.innerHTML = `${COPY_ICON} Copy`;
      btn.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(getText());
          btn.innerHTML = `${CHECK_ICON} Copied`;
          btn.classList.add("copied");
          setTimeout(() => {
            btn.innerHTML = `${COPY_ICON} Copy`;
            btn.classList.remove("copied");
          }, 2000);
        } catch { /* clipboard not available */ }
      });
      return btn;
    }

    // ── Chat logic ──────────────────────────────────────────────────
    function appendMessage(text, cls) {
      if (chatEmpty) chatEmpty.remove();
      const displayText = cls.includes("bot") ? text.trim() : text;
      if (cls.includes("bot")) {
        const wrapper = document.createElement("div");
        wrapper.className = "msg-wrapper";
        const div = document.createElement("div");
        div.className = `message ${cls}`;
        div.textContent = displayText;
        wrapper.appendChild(div);
        wrapper.appendChild(createCopyBtn(() => div.textContent));
        chatContainer.appendChild(wrapper);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return div;
      }
      const div = document.createElement("div");
      div.className = `message ${cls}`;
      div.textContent = text;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const text = msgInput.value.trim();
      if (!text) return;
      msgInput.value = "";
      appendMessage(text, "user");

      const typing = document.createElement("div");
      typing.className = "typing";
      typing.innerHTML = '<span class="typing-dots"><span></span><span></span><span></span></span> Thinking…';
      chatContainer.appendChild(typing);
      chatContainer.scrollTop = chatContainer.scrollHeight;

      sendBtn.disabled = true;
      msgInput.disabled = true;

      try {
        const resp = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text }),
        });
        typing.remove();
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          appendMessage(`Error: ${err.detail || resp.statusText}`, "bot error");
          return;
        }
        const data = await resp.json();
        appendMessage(data.reply, "bot");
      } catch (e) {
        typing.remove();
        appendMessage(`Network error: ${e.message}`, "bot error");
      } finally {
        sendBtn.disabled = false;
        msgInput.disabled = false;
        msgInput.focus();
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    msgInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // ── Report logic ────────────────────────────────────────────────
    const queryList = document.getElementById("query-list");
    const addQueryBtn = document.getElementById("add-query-btn");
    const runReportBtn = document.getElementById("run-report-btn");
    const reportStatus = document.getElementById("report-status");
    const reportResults = document.getElementById("report-results");

    function createQueryRow(value = "") {
      const row = document.createElement("div");
      row.className = "query-row";
      row.innerHTML = `
        <input type="text" class="query-input" placeholder="Enter a query…" value="${value.replace(/"/g, '&quot;')}" />
        <button class="btn-icon danger remove-query" title="Remove">&times;</button>
      `;
      return row;
    }

    addQueryBtn.addEventListener("click", () => {
      queryList.appendChild(createQueryRow());
      const inputs = queryList.querySelectorAll(".query-input");
      inputs[inputs.length - 1].focus();
    });

    queryList.addEventListener("click", (e) => {
      const removeBtn = e.target.closest(".remove-query");
      if (!removeBtn) return;
      const rows = queryList.querySelectorAll(".query-row");
      if (rows.length <= 1) return; // keep at least one row
      removeBtn.closest(".query-row").remove();
    });

    function renderReport(data) {
      reportResults.innerHTML = "";

      // Summary
      const summary = document.createElement("div");
      summary.className = "report-summary";
      summary.innerHTML = `
        <span class="stat"><b>${data.total}</b> total</span>
        <span class="stat"><b>${data.succeeded}</b> succeeded</span>
        <span class="stat fail"><b>${data.failed}</b> failed</span>
      `;
      reportResults.appendChild(summary);

      // Each result
      data.results.forEach((r, i) => {
        const item = document.createElement("div");
        item.className = "report-item";
        const queryLabel = document.createElement("div");
        queryLabel.className = "query-label";
        queryLabel.textContent = `Query ${i + 1}: ${r.query}`;
        item.appendChild(queryLabel);

        const resp = document.createElement("div");
        if (r.error) {
          resp.className = "response error-text";
          resp.textContent = `Error: ${r.error}`;
        } else {
          resp.className = "response";
          resp.textContent = r.response ?? "(no response)";
        }
        item.appendChild(resp);
        if (!r.error) {
          item.appendChild(createCopyBtn(() => resp.textContent));
        }
        reportResults.appendChild(item);
      });
    }

    async function runReport() {
      const systemPrompt = document.getElementById("system-prompt").value.trim();
      if (!systemPrompt) {
        reportStatus.textContent = "System prompt is required.";
        return;
      }
      const queries = Array.from(queryList.querySelectorAll(".query-input"))
        .map(inp => inp.value.trim())
        .filter(q => q.length > 0);
      if (queries.length === 0) {
        reportStatus.textContent = "At least one query is required.";
        return;
      }

      runReportBtn.disabled = true;
      reportStatus.textContent = "Running report…";
      reportResults.innerHTML = "";

      try {
        const resp = await fetch("/api/report", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ queries, system_prompt: systemPrompt }),
        });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          reportStatus.textContent = `Error: ${err.detail || resp.statusText}`;
          return;
        }
        const data = await resp.json();
        reportStatus.textContent = "Report completed.";
        renderReport(data);
      } catch (e) {
        reportStatus.textContent = `Network error: ${e.message}`;
      } finally {
        runReportBtn.disabled = false;
      }
    }

    runReportBtn.addEventListener("click", runReport);

    init();
  </script>
</body>
</html>
