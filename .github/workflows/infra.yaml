name: infra

on:
  push:
    branches:
      - 'main'
  schedule:
    - cron: "00 00 * * 3"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TERRAFORM_VERSION: 1.13.4
  TFLINT_VERSION: v0.60.0
  TRIVY_VERSION: v0.69.2

jobs:
  # Lint and security scan (no auth required)
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514
        with:
          version: ${{ env.TRIVY_VERSION }}
          cache: true
      - name: Run lint and security scan
        working-directory: infra
        run: |
          make tflint trivy

  # Test Azure scenarios (azure_*)
  test-azure:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: lint
    environment: dev
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - azure_container_apps
          - azure_github_oidc
          - azure_microsoft_foundry
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_USE_OIDC: ${{ secrets.ARM_USE_OIDC }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - name: Run Azure scenario test (${{ matrix.scenario }})
        working-directory: infra
        run: |
          echo "Test: ${{ matrix.scenario }}"
          make _ci-test-base SCENARIO=${{ matrix.scenario }}

  # Test GitHub scenarios (github_*)
  test-github:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: lint
    environment: dev
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - github_secrets
    env:
      GITHUB_TOKEN: ${{ secrets.GH_PAT }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - name: Run GitHub scenario test (${{ matrix.scenario }})
        working-directory: infra
        run: |
          echo "Test: ${{ matrix.scenario }}"
          make _ci-test-base SCENARIO=${{ matrix.scenario }}
