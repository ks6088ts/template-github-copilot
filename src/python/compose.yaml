services:
  copilot:
    build:
      context: .
      dockerfile: copilot.Dockerfile
      args:
        COPILOT_CLI_VERSION: "0.0.420"
    environment:
      - COPILOT_GITHUB_TOKEN=${COPILOT_GITHUB_TOKEN}
      - COPILOT_MODEL=${COPILOT_MODEL:-gpt-5-mini}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const c=require('net').createConnection(3000,'127.0.0.1',()=>{c.end();process.exit(0)});c.on('error',()=>process.exit(1))\""]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: api.Dockerfile
    env_file:
      - .env
    environment:
      - COPILOT_CLI_URL=copilot:3000
      - API_HOST=0.0.0.0
      - API_PORT=8000
    ports:
      - "8000:8000"
    depends_on:
      copilot:
        condition: service_healthy

  monolith:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        COPILOT_CLI_VERSION: "0.0.420"
    env_file:
      - .env
    environment:
      - COPILOT_GITHUB_TOKEN=${COPILOT_GITHUB_TOKEN}
      - COPILOT_MODEL=${COPILOT_MODEL:-gpt-5-mini}
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - COPILOT_CLI_URL=127.0.0.1:3000
    ports:
      - "3000:3000"
      - "8000:8000"
    profiles:
      - monolith
