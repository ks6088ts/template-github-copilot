name: infra

on:
  push:
    branches:
      - 'main'
  schedule:
    - cron: "00 00 * * 3"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TERRAFORM_VERSION: 1.13.4
  TFLINT_VERSION: v0.60.0
  TRIVY_VERSION: v0.68.2

jobs:
  # Lint and security scan (no auth required)
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}
      - name: Cache TFLint plugins
        uses: actions/cache@v5
        with:
          path: ~/.tflint.d/plugins
          key: tflint-${{ runner.os }}-${{ hashFiles('**/.tflint.hcl') }}
          restore-keys: tflint-${{ runner.os }}-
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.5
        with:
          version: ${{ env.TRIVY_VERSION }}
          cache: true
      - name: Run lint and security scan
        run: |
          tflint --init
          tflint --recursive
          trivy config .

  # Test Azure scenarios (azure_*)
  test-azure:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: lint
    environment: dev
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_USE_OIDC: ${{ secrets.ARM_USE_OIDC }}
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - name: Cache Terraform plugins
        uses: actions/cache@v5
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: terraform-${{ runner.os }}-azure-${{ hashFiles('infra/scenarios/azure_github_oidc/.terraform.lock.hcl') }}
          restore-keys: terraform-${{ runner.os }}-azure-
      - name: Create plugin cache directory
        run: mkdir -p "$TF_PLUGIN_CACHE_DIR"
      - name: Run Azure scenario test (azure_github_oidc)
        working-directory: infra/scenarios/azure_github_oidc
        run: |
          terraform init
          terraform fmt -check
          terraform validate
          terraform test
          terraform plan

  # Test GitHub scenarios (github_*)
  test-github:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: lint
    environment: dev
    env:
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - name: Cache Terraform plugins
        uses: actions/cache@v5
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: terraform-${{ runner.os }}-github-${{ hashFiles('infra/scenarios/github_secrets/.terraform.lock.hcl') }}
          restore-keys: terraform-${{ runner.os }}-github-
      - name: Create plugin cache directory
        run: mkdir -p "$TF_PLUGIN_CACHE_DIR"
      - name: Run GitHub scenario test
        working-directory: infra/scenarios/github_secrets
        run: |
          terraform init
          terraform fmt -check
          terraform validate
          terraform test
          terraform plan
