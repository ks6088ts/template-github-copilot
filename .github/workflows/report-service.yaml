name: report-service

on:
  workflow_dispatch:
    inputs:
      system_prompt:
        type: string
        description: "The system prompt to configure the assistant's behavior"
        required: true
        default: "You are a helpful assistant."
      queries:
        type: string
        description: "Comma-separated user queries (e.g. 'query1,query2,query3')"
        required: true
      auth_method:
        type: choice
        description: "LLM provider authentication method"
        options:
          - github_copilot
          - foundry_entra_id
        required: true
        default: github_copilot
      model:
        type: choice
        description: "Specify the model to use for Copilot CLI server (used when auth_method is github_copilot)"
        options:
          - gpt-5-mini
          - claude-sonnet-4.6
          - claude-opus-4.6
          - claude-opus-4.6-fast
        required: false
        default: gpt-5-mini
      sas_expiry_hours:
        type: number
        description: "Hours until the SAS URL expires"
        required: false
        default: 1
      save_artifacts:
        type: boolean
        description: "Whether to save the artifacts generated by the report service"
        required: false
        default: false
      retention_days:
        type: number
        description: "Number of days to retain the artifacts"
        required: false
        default: 1

permissions:
  id-token: write
  contents: read

jobs:
  report-service:
    strategy:
      matrix:
        platform:
          - "ubuntu-latest"
        python-version:
          - "3.13"
        node-version:
          - "22.12.0"
        copilot-cli-version:
          - "0.0.418"
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 5
    environment: dev
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Set up uv with caching enabled
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install GitHub Copilot CLI
        run: |
          curl -fsSL https://gh.io/copilot-install | VERSION="${{ matrix.copilot-cli-version }}" bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install Python dependencies
        working-directory: src/python
        run: |
          make install-deps
      - name: Start Copilot server
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        working-directory: src/python
        run: |
          make copilot COPILOT_MODEL="${{ github.event.inputs.model }}" &
          echo "Waiting for Copilot server to start on port 3000..."
          for i in $(seq 1 30); do
            if nc -z localhost 3000 2>/dev/null; then
              echo "Copilot server is ready!"
              break
            fi
            echo "Attempt $i/30: Server not ready yet, retrying in 2s..."
            sleep 2
          done
      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      - name: Run report service
        id: report
        shell: bash
        working-directory: src/python
        env:
          MICROSOFT_FOUNDRY_PROJECT_ENDPOINT: ${{ secrets.MICROSOFT_FOUNDRY_PROJECT_ENDPOINT }}
        run: |
          ARGS=(
            --verbose
            --system-prompt "${{ github.event.inputs.system_prompt }}"
            --queries "${{ github.event.inputs.queries }}"
            --account-url "${{ secrets.AZURE_BLOB_STORAGE_ACCOUNT_URL }}"
            --container-name "${{ secrets.AZURE_BLOB_STORAGE_CONTAINER_NAME }}"
            --blob-name "report_${{ github.run_id }}.json"
            --sas-expiry-hours "${{ github.event.inputs.sas_expiry_hours }}"
            --auth-method "${{ github.event.inputs.auth_method }}"
          )

          if [[ "${{ github.event.inputs.auth_method }}" != "github_copilot" ]]; then
            ARGS+=(
              --byok-provider-type "${{ secrets.BYOK_PROVIDER_TYPE }}"
              --byok-base-url "${{ secrets.BYOK_BASE_URL }}"
              --byok-model "${{ secrets.BYOK_MODEL }}"
              --byok-wire-api "${{ secrets.BYOK_WIRE_API }}"
            )
          fi

          uv run python scripts/report_service.py generate "${ARGS[@]}"
      - name: Save artifacts
        if: ${{ github.event.inputs.save_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: report-service-artifacts
          path: |
            "./artifacts/**"
            "./src/python/artifacts/**"
          retention-days: ${{ github.event.inputs.retention_days }}
      - name: Send message to Slack
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        working-directory: src/python
        run: |
          MESSAGE=$(cat <<'EOF'
          :white_check_mark: *Report Generation Complete*

          *Workflow:* `${{ github.workflow }}` (Run #${{ github.run_number }})
          *Triggered by:* ${{ github.actor }}
          *Model:* `${{ github.event.inputs.model }}`
          *System Prompt:* ${{ github.event.inputs.system_prompt }}
          *Queries:* ${{ github.event.inputs.queries }}
          *Blob:* `report_${{ github.run_id }}.json`
          *Container:* `${{ secrets.AZURE_BLOB_STORAGE_CONTAINER_NAME }}`
          *SAS Expiry:* ${{ github.event.inputs.sas_expiry_hours }} hour(s)

          :link: *Download Report:* ${{ steps.report.outputs.sas_url }}
          EOF
          )
          uv run python scripts/slacks.py send \
            --webhook-url "$SLACK_WEBHOOK_URL" \
            --message "$MESSAGE"
