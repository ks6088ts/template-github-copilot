theme:
  name: material
  # https://squidfunk.github.io/mkdocs-material/setup/setting-up-site-search/
  features:
    - search.suggest
    - search.highlight
    - search.share
  # https://squidfunk.github.io/mkdocs-material/setup/changing-the-colors/#automatic-light-dark-mode
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  icon:
    repo: fontawesome/brands/github
  language: en
extra:
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/ks6088ts/
    - icon: fontawesome/brands/github
      link: https://github.com/ks6088ts
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/ks6088ts
  analytics:
    provider: google
    property: G-0ZTKFXVQ5K
markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.keys
  - toc:
      # Unicode-aware slugify so non-Latin (e.g. Japanese) headings get readable,
      # stable anchors instead of being stripped to empty/auto-generated ids.
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
plugins:
  # https://squidfunk.github.io/mkdocs-material/setup/setting-up-site-search/
  - search:
      lang:
        - en
        - ja
      separator: '[\s\u200b\-、。：！？「」（）]+'
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: ja
          name: 日本語
          build: true
