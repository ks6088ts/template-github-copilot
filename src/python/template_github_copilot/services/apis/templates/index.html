<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Copilot Chat</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #238636;
      --accent-hover: #2ea043;
      --user-bg: #1f2937;
      --bot-bg: #21262d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 1.1rem; }
    .user-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .user-info img {
      width: 28px;
      height: 28px;
      border-radius: 50%;
    }
    .btn {
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 0.85rem;
      text-decoration: none;
    }
    .btn:hover { border-color: var(--muted); }
    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-hover); }

    /* Chat area */
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: 10px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.92rem;
    }
    .message.user {
      align-self: flex-end;
      background: var(--user-bg);
    }
    .message.bot {
      align-self: flex-start;
      background: var(--bot-bg);
      border: 1px solid var(--border);
    }
    .message.error {
      color: #f85149;
      border-color: #f85149;
    }
    .typing {
      align-self: flex-start;
      color: var(--muted);
      font-style: italic;
      font-size: 0.85rem;
    }

    /* Input bar */
    #input-bar {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    #input-bar input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      font-size: 0.92rem;
      outline: none;
    }
    #input-bar input:focus { border-color: var(--accent); }

    /* Login screen */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 16px;
    }
    #login-screen p { color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>Copilot Chat</h1>
    <div id="header-right"></div>
  </header>

  <!-- Login screen (shown when not authenticated) -->
  <div id="login-screen" style="display:none;">
    <p>Sign in with your GitHub account to start chatting with Copilot.</p>
    <a href="/auth/login" class="btn btn-primary">Login with GitHub</a>
  </div>

  <!-- Chat UI (shown when authenticated) -->
  <div id="chat-container" style="display:none;"></div>
  <div id="input-bar" style="display:none;">
    <input type="text" id="msg-input" placeholder="Type a message…" autocomplete="off" />
    <button class="btn btn-primary" id="send-btn">Send</button>
  </div>

  <script>
    const chatContainer = document.getElementById("chat-container");
    const inputBar = document.getElementById("input-bar");
    const loginScreen = document.getElementById("login-screen");
    const headerRight = document.getElementById("header-right");
    const msgInput = document.getElementById("msg-input");
    const sendBtn = document.getElementById("send-btn");

    // ── Bootstrap ───────────────────────────────────────────────────
    async function init() {
      try {
        const resp = await fetch("/api/me");
        if (!resp.ok) throw new Error("not authed");
        const user = await resp.json();
        showChat(user);
      } catch {
        showLogin();
      }
    }

    function showLogin() {
      loginScreen.style.display = "flex";
      chatContainer.style.display = "none";
      inputBar.style.display = "none";
      headerRight.innerHTML = "";
    }

    function showChat(user) {
      loginScreen.style.display = "none";
      chatContainer.style.display = "flex";
      inputBar.style.display = "flex";

      let avatar = "";
      if (user.avatar_url) {
        avatar = `<img src="${user.avatar_url}" alt="avatar" />`;
      }
      headerRight.innerHTML = `
        <div class="user-info">
          ${avatar}
          <span>${user.login}</span>
          <a href="/auth/logout" class="btn">Logout</a>
        </div>
      `;
      msgInput.focus();
    }

    // ── Chat logic ──────────────────────────────────────────────────
    function appendMessage(text, cls) {
      const div = document.createElement("div");
      div.className = `message ${cls}`;
      div.textContent = text;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const text = msgInput.value.trim();
      if (!text) return;
      msgInput.value = "";
      appendMessage(text, "user");

      const typing = document.createElement("div");
      typing.className = "typing";
      typing.textContent = "Copilot is thinking…";
      chatContainer.appendChild(typing);
      chatContainer.scrollTop = chatContainer.scrollHeight;

      sendBtn.disabled = true;
      msgInput.disabled = true;

      try {
        const resp = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text }),
        });
        typing.remove();
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          appendMessage(`Error: ${err.detail || resp.statusText}`, "bot error");
          return;
        }
        const data = await resp.json();
        appendMessage(data.reply, "bot");
      } catch (e) {
        typing.remove();
        appendMessage(`Network error: ${e.message}`, "bot error");
      } finally {
        sendBtn.disabled = false;
        msgInput.disabled = false;
        msgInput.focus();
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    msgInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    init();
  </script>
</body>
</html>
