name: github-copilot-cli

on:
  workflow_dispatch:
    inputs:
      prompt:
        type: string
        description: "The prompt to use for Copilot CLI"
        required: true
        default: "Hello"
      model:
        type: choice
        description: Specify the model to use for Copilot CLI
        options:
          - gpt-5-mini
          - claude-sonnet-4.6
          - claude-opus-4.6
          - claude-opus-4.6-fast
        required: true
        default: gpt-5-mini
      save_artifacts:
        type: boolean
        description: "Whether to save the artifacts generated by Copilot CLI"
        required: false
        default: false
      retention_days:
        type: number
        description: "Number of days to retain the artifacts"
        required: false
        default: 1

jobs:
  test:
    strategy:
      matrix:
        platform:
          - "ubuntu-latest"
        node-version:
          - "22.12.0"
        copilot-cli-version:
          - "0.0.418"
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 5
    environment: dev
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install GitHub Copilot CLI
        run: |
          curl -fsSL https://gh.io/copilot-install | VERSION="${{ matrix.copilot-cli-version }}" bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Run GitHub Copilot CLI
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          copilot \
            --prompt "${{ github.event.inputs.prompt }}" \
            --log-level all \
            --allow-all-tools --allow-all-paths --allow-all-urls \
            --model "${{ github.event.inputs.model }}"
      - name: Save artifacts
        if: ${{ github.event.inputs.save_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: copilot-cli-artifacts
          path: ./artifacts/**
          retention-days: ${{ github.event.inputs.retention_days }}
