name: report-service

on:
  workflow_dispatch:
    inputs:
      system_prompt:
        type: string
        description: "The system prompt to configure the assistant's behavior"
        required: true
        default: "You are a helpful assistant."
      queries:
        type: string
        description: "Comma-separated user queries (e.g. 'query1,query2,query3')"
        required: true
      auth_method:
        type: choice
        description: "LLM provider authentication method"
        options:
          - copilot
          - api_key
          - entra_id
        required: true
        default: copilot
      model:
        type: choice
        description: "Specify the model to use for Copilot CLI server (used when auth_method is copilot)"
        options:
          - gpt-5-mini
          - claude-opus-4.6
          - claude-sonnet-4.6
        required: false
        default: gpt-5-mini
      byok_provider_type:
        type: choice
        description: "BYOK provider type (used when auth_method is api_key or entra_id)"
        options:
          - openai
          - azure
          - anthropic
        required: false
        default: openai
      byok_base_url:
        type: string
        description: "BYOK provider base URL (used when auth_method is api_key or entra_id)"
        required: false
        default: "https://api.openai.com/v1/"
      byok_model:
        type: string
        description: "Model identifier for the BYOK provider (used when auth_method is api_key or entra_id)"
        required: false
        default: gpt-5
      byok_wire_api:
        type: choice
        description: "Wire API format (used when auth_method is api_key or entra_id)"
        options:
          - completions
          - responses
        required: false
        default: responses
      azure_blob_storage_account_url:
        type: string
        description: "The URL of the Azure Blob Storage account to which the report service will write. Format: https://<your-storage-account>.blob.core.windows.net"
        required: true
      azure_blob_storage_container_name:
        type: string
        description: "The name of the Azure Blob Storage container to which the report service will write. Format: <your-container-name>"
        required: true
      sas_expiry_hours:
        type: number
        description: "Hours until the SAS URL expires"
        required: false
        default: 1

permissions:
  id-token: write
  contents: read

jobs:
  report-service:
    strategy:
      matrix:
        platform:
          - "ubuntu-latest"
        python-version:
          - "3.13"
        node-version:
          - "22.12.0"
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 5
    environment: dev
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Set up uv with caching enabled
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install GitHub Copilot CLI
        run: |
          curl -fsSL https://gh.io/copilot-install | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install Python dependencies
        working-directory: src/python
        run: |
          make install-deps
      - name: Start Copilot server
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        working-directory: src/python
        run: |
          make copilot COPILOT_MODEL="${{ github.event.inputs.model }}" &
          echo "Waiting for Copilot server to start on port 3000..."
          for i in $(seq 1 30); do
            if nc -z localhost 3000 2>/dev/null; then
              echo "Copilot server is ready!"
              break
            fi
            echo "Attempt $i/30: Server not ready yet, retrying in 2s..."
            sleep 2
          done
      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      - name: Run report service
        id: report
        shell: bash
        working-directory: src/python
        env:
          BYOK_API_KEY: ${{ secrets.BYOK_API_KEY }}
        run: |
          ARGS=(
            --verbose
            --system-prompt "${{ github.event.inputs.system_prompt }}"
            --queries "${{ github.event.inputs.queries }}"
            --account-url "${{ github.event.inputs.azure_blob_storage_account_url }}"
            --container-name "${{ github.event.inputs.azure_blob_storage_container_name }}"
            --blob-name "report_${{ github.run_id }}.json"
            --sas-expiry-hours "${{ github.event.inputs.sas_expiry_hours }}"
            --auth-method "${{ github.event.inputs.auth_method }}"
          )

          if [[ "${{ github.event.inputs.auth_method }}" != "copilot" ]]; then
            ARGS+=(
              --byok-provider-type "${{ github.event.inputs.byok_provider_type }}"
              --byok-base-url "${{ github.event.inputs.byok_base_url }}"
              --byok-api-key "$BYOK_API_KEY"
              --byok-model "${{ github.event.inputs.byok_model }}"
              --byok-wire-api "${{ github.event.inputs.byok_wire_api }}"
            )
          fi

          uv run python scripts/report_service.py generate "${ARGS[@]}"
      - name: Send message to Slack
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        working-directory: src/python
        run: |
          MESSAGE=$(cat <<'EOF'
          :white_check_mark: *Report Generation Complete*

          *Workflow:* `${{ github.workflow }}` (Run #${{ github.run_number }})
          *Triggered by:* ${{ github.actor }}
          *Model:* `${{ github.event.inputs.model }}`
          *System Prompt:* ${{ github.event.inputs.system_prompt }}
          *Queries:* ${{ github.event.inputs.queries }}
          *Blob:* `report_${{ github.run_id }}.json`
          *Container:* `${{ github.event.inputs.azure_blob_storage_container_name }}`
          *SAS Expiry:* ${{ github.event.inputs.sas_expiry_hours }} hour(s)

          :link: *Download Report:* ${{ steps.report.outputs.sas_url }}
          EOF
          )
          uv run python scripts/slacks.py send \
            --webhook-url "$SLACK_WEBHOOK_URL" \
            --message "$MESSAGE"
